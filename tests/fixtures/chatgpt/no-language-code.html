<!doctype html>
<html>
  <head><title>ChatGPT</title></head>
  <body>
    <main>
      <article data-message-author-role="user" data-message-id="m1">
        <div class="whitespace-pre-wrap">paste a snippet</div>
      </article>
      <article data-message-author-role="assistant" data-message-id="m2">
        <div class="markdown">
          <p>Sure:</p>
          <pre><code class="hljs">SELECT * FROM users WHERE active = TRUE;</code></pre>
          <p>And another without any language hint:</p>
          <pre><code>x = 1
y = 2
print(x + y)</code></pre>
        </div>
      </article>
    </main>
  </body>
</html>
